// ─── Хелперы ─────────────────────────────────────────────────────────────
// Понедельник текущей недели в формате YYYY-MM-DD (для plan.week_start)
function getCurrentMonday() {
  const d = new Date();
  const day = d.getDay();              // 0=Вс, 1=Пн, ..., 6=Сб
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${yyyy}-${mm}-${dd}`;
}

// В БД нет color/bg — подставляем по типу мяса.
function decorateRecipe(r) {
  const fallback = r.type === 'chicken'
    ? { color: '#B8860B', bg: '#FFF8E1' }
    : { color: '#8B1A4A', bg: '#FDE8F0' };
  return { ...fallback, ...r };
}

// ─── Баннер ошибок синхронизации ─────────────────────────────────────────
let syncBannerTimer = null;
function showSyncError(msg) {
  const el = document.getElementById('syncBanner');
  if (!el) return;
  el.textContent = `⚠️ Не сохранилось: ${msg}`;
  el.classList.add('show');
  if (syncBannerTimer) clearTimeout(syncBannerTimer);
  syncBannerTimer = setTimeout(() => el.classList.remove('show'), 5000);
}

// Оптимистичная синхронизация: вызываем supabaseCall в фоне.
// Если упадёт — показываем баннер и перечитываем реальное состояние из БД.
async function cloudSync(supabaseCall) {
  try {
    await supabaseCall();
  } catch (e) {
    console.error('cloud sync failed', e);
    showSyncError(e.message || 'неизвестная ошибка');
    try {
      await loadFromSupabase();
      render();
    } catch (e2) {
      console.error('reload failed', e2);
    }
  }
}

// ─── Чтение из Supabase ──────────────────────────────────────────────────
async function loadFromSupabase() {
  const tgId = authUser.telegram_id;
  state.weekStart = getCurrentMonday();

  // 1) Рецепты пользователя
  const { data: recipes, error: rErr } = await supabase
    .from('recipes')
    .select('id, name, type, category, emoji, recipe, serve, time, meat, ingredients, nutrition')
    .eq('user_id', tgId)
    .order('created_at', { ascending: true });
  if (rErr) throw new Error(`Загрузка рецептов: ${rErr.message}`);
  state.recipes = (recipes || []).map(decorateRecipe);

  // 2) Активные (галочки)
  const { data: actives, error: aErr } = await supabase
    .from('active_recipes')
    .select('recipe_id')
    .eq('user_id', tgId);
  if (aErr) throw new Error(`Загрузка активных: ${aErr.message}`);
  state.activeIds = new Set((actives || []).map(a => a.recipe_id));

  // 3) План на текущую неделю
  const { data: planRows, error: pErr } = await supabase
    .from('plan')
    .select('day_index, recipe_id, side, status')
    .eq('user_id', tgId)
    .eq('week_start', state.weekStart);
  if (pErr) throw new Error(`Загрузка плана: ${pErr.message}`);

  state.plan = DAYS.map(() => ({ recipeId: null, side: null, status: null }));
  (planRows || []).forEach(row => {
    if (row.day_index >= 0 && row.day_index < 14) {
      state.plan[row.day_index] = {
        recipeId: row.recipe_id,
        side: row.side,
        status: row.status,
      };
    }
  });
}

// ═══════════════════ RENDER ═══════════════════
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'className') el.className = v;
    else if (k === 'html') el.innerHTML = v;
    else el.setAttribute(k, v);
  });
  children.flat(9).forEach(c => { if (c != null) el.append(typeof c === 'string' ? document.createTextNode(c) : c); });
  return el;
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  const activeRecipes = state.recipes.filter(r => state.activeIds.has(r.id));

  // Header
  app.append(h('div', { className: 'header' },
    h('div', { style: { fontSize: '32px' } }, '🧊'),
    h('h1', null, 'Meal Prep Planner'),
    h('p', null, 'Заготовки → Закупки → Ужины')
  ));

  // Tabs
  const tabNames = ['📋 Рецепты', '🛒 Закупки', '🗓 План', '➕ Добавить'];
  const tabs = h('div', { className: 'tabs' });
  tabNames.forEach((name, i) => {
    tabs.append(h('button', {
      className: 'tab' + (state.tab === i ? ' active' : ''),
      onClick: () => { state.tab = i; render(); }
    }, name));
  });
  app.append(tabs);

  // Tab content
  if (state.tab === 0) renderRecipes(app, activeRecipes);
  else if (state.tab === 1) renderShopping(app, activeRecipes);
  else if (state.tab === 2) renderPlanner(app, activeRecipes);
  else if (state.tab === 3) renderAddForm(app);
}

// ═══ RECIPES TAB ═══
function renderRecipes(app, activeRecipes) {
  const wrap = h('div', { className: 'tab-content active' });

  wrap.append(h('div', { className: 'info-bar' },
    h('span', { className: 'main' }, `Включено: ${state.activeIds.size} из ${state.recipes.length}`),
    h('span', { className: 'muted' }, `= ${state.activeIds.size} ужинов на двоих`)
  ));
  wrap.append(h('p', { className: 'muted', style: { marginBottom: '8px' } }, 'Галочка — включить/выключить. Нажми на карточку — рецепт.'));

  ['chicken', 'pork'].forEach(type => {
    wrap.append(h('div', { className: 'h3' }, type === 'chicken' ? '🍗 Курица' : '🥩 Свинина'));
    state.recipes.filter(r => r.type === type).forEach(r => {
      wrap.append(renderRecipeCard(r));
    });
  });

  app.append(wrap);
}

function renderRecipeCard(r) {
  const active = state.activeIds.has(r.id);
  const exp = state.expanded[r.id];
  const card = h('div', { className: 'card' + (active ? '' : ' dimmed') });

  const head = h('div', { className: 'card-head' });

  const cb = h('div', {
    className: 'checkbox' + (active ? ' checked' : ''),
    onClick: (e) => {
      e.stopPropagation();
      const tgId = authUser.telegram_id;
      if (active) {
        state.activeIds.delete(r.id);
        render();
        cloudSync(async () => {
          const { error } = await supabase.from('active_recipes')
            .delete()
            .eq('user_id', tgId)
            .eq('recipe_id', r.id);
          if (error) throw new Error(error.message);
        });
      } else {
        state.activeIds.add(r.id);
        render();
        cloudSync(async () => {
          const { error } = await supabase.from('active_recipes')
            .insert({ user_id: tgId, recipe_id: r.id });
          if (error) throw new Error(error.message);
        });
      }
    }
  }, active ? '✓' : '');

  const body = h('div', { className: 'card-body', onClick: () => { state.expanded[r.id] = !state.expanded[r.id]; render(); } },
    h('div', { className: 'card-title' },
      h('span', { className: 'emoji' }, r.emoji),
      h('span', { className: 'name' }, r.name)
    ),
    h('div', { className: 'card-meta' },
      h('span', { className: 'badge', style: { background: r.bg, color: r.color } }, r.category === 'marinade' ? 'маринад' : 'полуфабрикат'),
      h('span', { className: 'badge', style: { background: '#F5F5F5', color: '#555' } }, `${r.meat.grams} г`),
      h('span', { className: 'muted', style: { fontSize: '11px' } }, `⏱ ${r.time} мин`)
    )
  );

  const arrow = h('span', {
    className: 'arrow' + (exp ? ' open' : ''),
    onClick: () => { state.expanded[r.id] = !state.expanded[r.id]; render(); }
  }, '▾');

  head.append(cb, body, arrow);
  card.append(head);

  if (exp) {
    const detail = h('div', { className: 'recipe-detail open' });
    detail.append(
      h('div', { style: { marginTop: '10px' } },
        h('div', { className: 'label', style: { color: r.color } }, '📝 Как заготовить:'),
        h('div', null, r.recipe)
      ),
      h('div', { style: { marginTop: '8px' } },
        h('div', { className: 'label', style: { color: r.color } }, '🍽 Как подавать вечером:'),
        h('div', null, r.serve)
      ),
      h('div', { style: { marginTop: '8px' } },
        h('div', { className: 'label', style: { color: r.color } }, '🧾 Ингредиенты:'),
        ...r.ingredients.map(ing =>
          h('div', { className: 'ing-row' },
            h('span', null, ing.name),
            h('span', null, ing.amount)
          )
        )
      ),
      h('button', { className: 'btn-outline btn-delete', style: { marginTop: '10px' }, onClick: () => {
        state.recipes = state.recipes.filter(x => x.id !== r.id);
        state.activeIds.delete(r.id);
        // План мог ссылаться на этот рецепт — каскад в БД проставит recipe_id=null,
        // локально убираем сразу для красивого UI
        state.plan.forEach(d => { if (d.recipeId === r.id) d.recipeId = null; });
        render();
        cloudSync(async () => {
          const { error } = await supabase.from('recipes')
            .delete()
            .eq('id', r.id);
          if (error) throw new Error(error.message);
        });
      }}, 'Удалить')
    );
    card.append(detail);
  }

  return card;
}

// ═══ SHOPPING TAB ═══
function renderShopping(app, activeRecipes) {
  const wrap = h('div', { className: 'tab-content active' });

  wrap.append(h('div', { style: { background: '#F0F7F2', borderRadius: '12px', padding: '14px', marginBottom: '12px', textAlign: 'center' } },
    h('div', { style: { fontWeight: 700, color: '#2D6A4F', fontSize: '15px' } }, `Список на ${state.activeIds.size} заготовок`),
    h('div', { className: 'muted' }, 'Каждая заготовка делается 1 раз · порция на двоих')
  ));

  if (state.activeIds.size === 0) {
    wrap.append(h('div', { style: { textAlign: 'center', padding: '40px', color: '#C4B9AB' } }, 'Включи заготовки во вкладке «Рецепты»'));
    app.append(wrap); return;
  }

  const meat = {}, extras = {};
  activeRecipes.forEach(r => {
    meat[r.meat.type] = (meat[r.meat.type] || 0) + r.meat.grams;
    r.ingredients.forEach(ing => {
      if (!extras[ing.name]) extras[ing.name] = [];
      extras[ing.name].push({ amount: ing.amount, from: r.name });
    });
  });

  wrap.append(h('div', { className: 'h3' }, '🥩 Мясо'));
  const meatCard = h('div', { className: 'card' });
  let totalMeat = 0;
  Object.entries(meat).forEach(([type, grams]) => {
    totalMeat += grams;
    const mt = MEAT_TYPES[type] || { emoji: '🍖', label: type };
    meatCard.append(h('div', { className: 'meat-row' },
      h('div', null, h('span', { style: { fontSize: '16px', marginRight: '6px' } }, mt.emoji), h('span', { style: { fontWeight: 600 } }, mt.label)),
      h('span', { style: { fontWeight: 800, fontSize: '15px', color: '#2D6A4F' } }, grams >= 1000 ? `${(grams/1000).toFixed(1)} кг` : `${grams} г`)
    ));
  });
  meatCard.append(h('div', { className: 'meat-total' }, `Всего мяса: ${(totalMeat/1000).toFixed(1)} кг`));
  wrap.append(meatCard);

  wrap.append(h('div', { className: 'h3' }, '🛒 Остальные продукты'));
  const extCard = h('div', { className: 'card' });
  Object.entries(extras).forEach(([name, entries]) => {
    extCard.append(h('div', { className: 'extra-row' },
      h('div', { className: 'extra-head' },
        h('span', { style: { fontWeight: 600 } }, name),
        h('span', { className: 'amount' }, entries.length === 1 ? entries[0].amount : entries.map(e => e.amount).join(' + '))
      ),
      h('div', { className: 'muted' }, entries.map(e => e.from).join(' · '))
    ));
  });
  wrap.append(extCard);

  wrap.append(h('div', { className: 'h3' }, '🌶️ Специи (проверить)'));
  wrap.append(h('div', { className: 'card spice-box' }, 'Соль · Чёрный перец · Паприка · Копчёная паприка · Карри · Орегано · Кориандр · Сушёный чеснок · Сушёный имбирь'));

  app.append(wrap);
}

// ═══ PLANNER TAB ═══
function renderPlanner(app, activeRecipes) {
  const wrap = h('div', { className: 'tab-content active' });

  wrap.append(h('div', { className: 'btn-group' },
    h('button', { className: 'btn', onClick: () => {
      const sh = [...activeRecipes].sort(() => Math.random() - 0.5);
      state.plan = DAYS.map((_, i) => i < state.activeIds.size
        ? { recipeId: sh[i % sh.length].id, side: SIDES[Math.floor(Math.random() * SIDES.length)].name }
        : { recipeId: null, side: null });
      state.editingDay = null; save(); render();
    }}, '✨ Заполнить'),
    h('button', { className: 'btn-outline', onClick: () => {
      state.plan = DAYS.map(() => ({ recipeId: null, side: null }));
      state.editingDay = null; save(); render();
    }}, 'Сбросить')
  ));

  const progress = h('div', { className: 'progress' });
  state.plan.forEach(d => progress.append(h('div', { className: 'progress-dot' + (d.recipeId ? ' filled' : '') })));
  wrap.append(progress);

  [0, 1].forEach(week => {
    wrap.append(h('div', { className: 'h3' }, `Неделя ${week + 1}`));
    for (let dayIdx = 0; dayIdx < 7; dayIdx++) {
      const idx = week * 7 + dayIdx;
      const d = state.plan[idx];
      const recipe = d.recipeId ? state.recipes.find(r => r.id === d.recipeId) : null;
      const isEditing = state.editingDay === idx;

      const row = h('div', {
        className: 'day-row' + (recipe ? ' filled' : '') + (isEditing ? ' editing' : ''),
        onClick: () => { state.editingDay = isEditing ? null : idx; render(); }
      });

      row.append(h('span', { className: 'day-label' }, DAYS[idx]));

      if (recipe) {
        const content = h('div', { className: 'day-content' });
        const titleRow = h('div', { style: { display: 'flex', alignItems: 'center', gap: '4px', flexWrap: 'wrap' } },
          h('span', null, recipe.emoji),
          h('span', { style: { fontWeight: 600 } }, recipe.name)
        );
        if (d.side) titleRow.append(h('span', { className: 'badge', style: { background: '#F0F7F2', color: '#2D6A4F', fontSize: '10px' } }, d.side));
        content.append(titleRow);
        content.append(h('div', { className: 'muted', style: { marginTop: '2px' } },
          h('span', null, recipe.serve.split('.')[0] + ' · '),
          h('span', { style: { fontWeight: 700, color: '#2D6A4F' } }, `⏱ ${recipe.time} мин`)
        ));
        row.append(content);
        row.append(h('button', { className: 'day-clear', onClick: (e) => {
          e.stopPropagation(); state.plan[idx] = { recipeId: null, side: null }; save(); render();
        }}, '×'));
      } else {
        row.append(h('span', { className: 'day-empty' }, 'Нажми, чтобы выбрать'));
      }

      wrap.append(row);

      if (isEditing) {
        const editor = h('div', { className: 'editor' });
        editor.append(h('div', { className: 'h3' }, 'Заготовка'));
        const chips1 = h('div', { className: 'chip-group' });
        activeRecipes.forEach(r => {
          const sel = d.recipeId === r.id;
          chips1.append(h('button', {
            className: 'chip' + (sel ? ' selected' : ''),
            style: sel ? { border: `2px solid ${r.color}`, background: r.bg, color: r.color } : {},
            onClick: (e) => { e.stopPropagation(); state.plan[idx].recipeId = r.id; save(); render(); }
          }, `${r.emoji} ${r.name}`));
        });
        editor.append(chips1);

        editor.append(h('div', { className: 'h3' }, 'Гарнир'));
        const chips2 = h('div', { className: 'chip-group' });
        SIDES.forEach(s => {
          const sel = d.side === s.name;
          chips2.append(h('button', {
            className: 'chip' + (sel ? ' selected' : ''),
            style: sel ? { border: '2px solid #2D6A4F', background: '#E8F5E9' } : {},
            onClick: (e) => { e.stopPropagation(); state.plan[idx].side = s.name; save(); render(); }
          }, `${s.emoji} ${s.name}`));
        });
        editor.append(chips2);

        editor.append(h('button', { className: 'btn btn-full', style: { marginTop: '4px' }, onClick: (e) => {
          e.stopPropagation(); state.editingDay = null; render();
        }}, '✓ Готово'));

        wrap.append(editor);
      }
    }
  });

  const planned = state.plan.filter(d => d.recipeId).length;
  if (planned > 0) {
    wrap.append(h('div', { className: 'summary', style: { marginTop: '8px' } },
      `Запланировано ${planned} ужин${planned === 1 ? '' : planned < 5 ? 'а' : 'ов'}`
    ));
  }

  app.append(wrap);
}

// ═══ ADD RECIPE TAB ═══
function renderAddForm(app) {
  const wrap = h('div', { className: 'tab-content active' });
  wrap.append(h('h2', { style: { fontSize: '16px', fontWeight: 700, margin: '8px 0' } }, 'Добавить рецепт'));
  wrap.append(h('p', { className: 'muted' }, 'Новая заготовка сразу появится в рецептах и в закупках'));

  if (!window._addForm) window._addForm = { name:'', type:'chicken', category:'marinade', emoji:'🍳', recipe:'', serve:'', time:'20', meatGrams:'300', ingredients: [{name:'',amount:''}] };
  const f = window._addForm;

  const field = (label, key, placeholder, type) => {
    const d = h('div', { className: 'form-group' });
    d.append(h('div', { className: 'h3' }, label));
    const inp = h(type === 'textarea' ? 'textarea' : 'input', {
      value: f[key], placeholder,
      ...(type === 'number' ? { type: 'number' } : {}),
      ...(type === 'textarea' ? { rows: '3' } : {}),
      onInput: (e) => { f[key] = e.target.value; }
    });
    d.append(inp);
    return d;
  };

  wrap.append(field('Название', 'name', 'Например: Свинина в горчице'));

  const typeRow = h('div', { className: 'form-row' });
  const typeDiv = h('div'); typeDiv.append(h('div', { className: 'h3' }, 'Мясо'));
  const tg1 = h('div', { className: 'toggle-group' });
  ['chicken', 'pork'].forEach(t => {
    tg1.append(h('button', {
      className: 'toggle-btn',
      style: { background: f.type === t ? '#2D6A4F' : '#E8E0D6', color: f.type === t ? '#fff' : '#2B2118' },
      onClick: () => { f.type = t; render(); }
    }, t === 'chicken' ? '🍗 Курица' : '🥩 Свинина'));
  });
  typeDiv.append(tg1); typeRow.append(typeDiv);

  const catDiv = h('div'); catDiv.append(h('div', { className: 'h3' }, 'Тип'));
  const tg2 = h('div', { className: 'toggle-group' });
  ['marinade', 'semi'].forEach(k => {
    tg2.append(h('button', {
      className: 'toggle-btn',
      style: { background: f.category === k ? '#2D6A4F' : '#E8E0D6', color: f.category === k ? '#fff' : '#2B2118', fontSize: '11px' },
      onClick: () => { f.category = k; render(); }
    }, k === 'marinade' ? 'Маринад' : 'Полуфабрикат'));
  });
  catDiv.append(tg2); typeRow.append(catDiv);
  wrap.append(typeRow);

  const numRow = h('div', { className: 'form-row' });
  const emojiDiv = h('div', { className: 'small' }); emojiDiv.append(h('div', { className: 'h3' }, 'Эмодзи'));
  emojiDiv.append(h('input', { value: f.emoji, onInput: (e) => { f.emoji = e.target.value; } }));
  numRow.append(emojiDiv);
  const gramDiv = h('div'); gramDiv.append(h('div', { className: 'h3' }, 'Мясо (г)'));
  gramDiv.append(h('input', { type: 'number', value: f.meatGrams, onInput: (e) => { f.meatGrams = e.target.value; } }));
  numRow.append(gramDiv);
  const timeDiv = h('div'); timeDiv.append(h('div', { className: 'h3' }, 'Время (мин)'));
  timeDiv.append(h('input', { type: 'number', value: f.time, onInput: (e) => { f.time = e.target.value; } }));
  numRow.append(timeDiv);
  wrap.append(numRow);

  wrap.append(field('Рецепт заготовки', 'recipe', 'Как приготовить и заморозить...', 'textarea'));
  wrap.append(field('Как подавать', 'serve', 'Как готовить из морозилки...', 'textarea'));

  const ingDiv = h('div', { className: 'form-group' });
  ingDiv.append(h('div', { className: 'h3' }, 'Ингредиенты'));
  f.ingredients.forEach((ing, i) => {
    ingDiv.append(h('div', { className: 'ing-form-row' },
      h('input', { value: ing.name, placeholder: 'Продукт', onInput: (e) => { f.ingredients[i].name = e.target.value; } }),
      h('input', { value: ing.amount, placeholder: 'Сколько', onInput: (e) => { f.ingredients[i].amount = e.target.value; } })
    ));
  });
  ingDiv.append(h('button', { className: 'btn-outline', style: { fontSize: '11px', padding: '4px 10px', marginTop: '4px' },
    onClick: () => { f.ingredients.push({ name: '', amount: '' }); render(); }
  }, '+ ещё'));
  wrap.append(ingDiv);

  const canSubmit = f.name && f.recipe;
  wrap.append(h('button', {
    className: 'btn btn-full',
    style: { marginTop: '8px', fontSize: '15px', padding: '12px', background: canSubmit ? '#2D6A4F' : '#D4C9BC', cursor: canSubmit ? 'pointer' : 'not-allowed' },
    onClick: async () => {
      if (!canSubmit) return;
      const tgId = authUser.telegram_id;
      const payload = {
        user_id: tgId,
        name: f.name,
        type: f.type,
        category: f.category,
        emoji: f.emoji,
        recipe: f.recipe,
        serve: f.serve,
        time: parseInt(f.time) || 20,
        meat: { type: f.type === 'chicken' ? 'chicken_fillet' : 'pork', grams: parseInt(f.meatGrams) || 300 },
        ingredients: f.ingredients.filter(i => i.name),
        is_default: false,
      };
      try {
        // 1) Создаём рецепт — БД даст uuid
        const { data: inserted, error: insErr } = await supabase
          .from('recipes')
          .insert(payload)
          .select('id, name, type, category, emoji, recipe, serve, time, meat, ingredients, nutrition')
          .single();
        if (insErr) throw new Error(insErr.message);

        // 2) Сразу делаем активным
        const { error: actErr } = await supabase
          .from('active_recipes')
          .insert({ user_id: tgId, recipe_id: inserted.id });
        if (actErr) throw new Error(actErr.message);

        // 3) Локально применяем
        state.recipes.push(decorateRecipe(inserted));
        state.activeIds.add(inserted.id);
        window._addForm = null;
        state.tab = 0;
        render();
      } catch (e) {
        console.error('add recipe failed', e);
        showSyncError(e.message || 'не удалось добавить');
      }
    }
  }, '✓ Добавить'));

  app.append(wrap);
}

  ));
}

function showStub()    { renderScreen('🧊', 'Meal Prep Planner', 'Это приложение работает только внутри Telegram. Откройте его через бота, в которого встроено это приложение.'); }
function showLoader()  { renderScreen('⏳', 'Подключаемся…', 'Проверяем доступ через Telegram'); }
function showError(m)  { renderScreen('⚠️', 'Ошибка авторизации', m || 'Неизвестная ошибка. Попробуйте перезапустить приложение.'); }

// ═══ INIT ═══════════════════════════════════
async function initApp() {
  const tg = window.Telegram?.WebApp;

  // Не в Telegram — показываем заглушку
  if (!tg || !tg.initData) {
    showStub();
    return;
  }

  tg.ready();
  tg.expand();
  showLoader();

  try {
    const resp = await fetch(CONFIG.AUTH_FUNCTION_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': CONFIG.SUPABASE_ANON_KEY,
      },
      body: JSON.stringify({ initData: tg.initData }),
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.error || `HTTP ${resp.status}`);
    }
    const data = await resp.json();
    authJwt = data.token;
    authUser = data.user;
    supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY, {
      auth: { persistSession: false, autoRefreshToken: false },
      global: { headers: { Authorization: `Bearer ${authJwt}` } },
    });
    console.log('authenticated', authUser);

    // Этап 4.1 — читаем рецепты, активные и план из Supabase
    await loadFromSupabase();
    render();
  } catch (e) {
    console.error('init error', e);
    showError(e.message);
  }
}

initApp();
</script>
</body>
